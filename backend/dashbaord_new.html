<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MediAlert | Heart + Temperature Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --neon-cyan: #00f3ff;
      --neon-pink: #ff00ff;
      --alert-red: #ff3131;
      --bg-dark: #0a0a0c;
    }

    body {
      background-color: var(--bg-dark);
      color: white;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 20px;
      background-image:
        linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    h2 {
      text-align: center;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan);
      margin-bottom: 30px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .card {
      background: rgba(15, 15, 20, 0.95);
      border: 1px solid rgba(0, 243, 255, 0.2);
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .heart-card {
      border-top: 3px solid var(--alert-red);
    }

    .temp-card {
      border-top: 3px solid var(--neon-pink);
    }

    .card-header {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: white;
    }

    .wave-container {
      height: 250px;
      margin-top: 20px;
    }

    .temp-bar-container {
      width: 100%;
      height: 20px;
      background: #222;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 15px;
    }

    .temp-bar {
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, #00f3ff, #ffee00, #ff3131);
      transition: 0.5s;
    }

    .temp-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      margin-top: 8px;
      color: #aaa;
    }
  </style>
</head>
<body>

<h2>MEDIALERT // HEART + TEMP MONITOR</h2>

<div class="dashboard-grid">


  <div class="card heart-card">
    <div class="card-header">[A] Heart Health ❤️</div>

    <div class="stat-row">
      <span class="stat-label">Heart Rate</span>
      <span class="stat-value" id="hr">-</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">HRV</span>
      <span class="stat-value" id="hrv">-</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">SpO2</span>
      <span class="stat-value">
        <span id="spo2">-</span>%
      </span>
    </div>
    <div class="stat-row">
  <span class="stat-label">Blood Volume</span>
  <span class="stat-value">
    <span id="bloodVolume">-</span>
  </span>
</div>


    <div class="wave-container">
      <canvas id="pulseChart"></canvas>
    </div>
  </div>


  <div class="card temp-card">
    <div class="card-header">[B] Temperature Monitor 🌡️</div>

    <div class="stat-row">
      <span class="stat-label">Body Temperature</span>
      <span class="stat-value">
        🌡️ <span id="temp">-</span>°C
      </span>
    </div>

    <div style="margin-top:20px;">
      <div style="font-size:14px; margin-bottom:8px;">
        Temperature Status
      </div>

      <div class="temp-bar-container">
        <div id="tempBar" class="temp-bar"></div>
      </div>

      <div class="temp-labels">
        <span>Normal</span>
        <span>Warm</span>
        <span>Fever</span>
      </div>
    </div>
  </div>

</div>

<script>
const API_URL = "http://10.13.118.120:8000/dashboard/latest";

/* HEART GRAPH SETUP */
const ctx = document.getElementById("pulseChart").getContext("2d");

const pulseChart = new Chart(ctx, {
  type: "line",
  data: {
    labels: Array(20).fill(""),
    datasets: [{
      label: "Heart Pulse Signal",
      data: [],
      borderColor: "#ff3131",
      backgroundColor: "rgba(255,49,49,0.1)",
      borderWidth: 2,
      pointRadius: 0,
      fill: true,
      tension: 0.4
    }]
  },

  options: {
    responsive: true,
    maintainAspectRatio: false,

    scales: {
      x: {
        display: true,
        title: {
          display: true,
          text: "Time (Recent Samples)",
          color: "#ffffff"
        },
        ticks: {
          color: "#aaaaaa"
        },
        grid: {
          color: "rgba(255,255,255,0.05)"
        }
      },

      y: {
        display: true,
        title: {
          display: true,
          text: "IR Signal Intensity",
          color: "#ffffff"
        },
        ticks: {
          color: "#aaaaaa"
        },
        grid: {
          color: "rgba(255,255,255,0.05)"
        }
      }
    },

    plugins: {
      legend: {
        display: true,
        labels: {
          color: "#ffffff"
        }
      }
    }
  }
});

async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const d = await res.json();


    document.getElementById("hr").innerText = d.heart_rate || "-";
    document.getElementById("hrv").innerText = d.hrv || "-";
    document.getElementById("spo2").innerText = d.spo2 || "-";


document.getElementById("bloodVolume").innerText =
  d.blood_flow?.blood_volume || d.blood_flow?.blood_flow_index || "-";
    <!-- Add this inside HEART HEALTH card after SpO2 -->



    const temp = d.temperature || 36.5;
    document.getElementById("temp").innerText = temp;


    let width = 50;

    if (temp < 36.5) width = 30;
    else if (temp < 37.5) width = 55;
    else if (temp < 38.5) width = 75;
    else width = 95;

    document.getElementById("tempBar").style.width = width + "%";

  
    if (d.ir_signal && d.ir_signal.length > 0) {
      pulseChart.data.datasets[0].data = d.ir_signal.slice(-20);
      pulseChart.update();
    }

  } catch (err) {
    console.log("Waiting for ESP32 data...");
  }
}

setInterval(fetchData, 1000);
</script>

</body>
</html>
