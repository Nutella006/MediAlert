<!DOCTYPE html>
<html>

<head>
    <title>MediAlert Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .alerts {
            color: red;
            font-weight: bold;
        }

        @keyframes flash {
            0% { background-color: red; }
            50% { background-color: darkred; }
            100% { background-color: red; }
        }

        .alert-active {
            animation: flash 1s infinite;
        }
    </style>
</head>

<body>


<div id="alertBox" style="
    display:none;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
">
</div>

<h1> MediAlert Dashboard</h1>

<div class="container">

    <div class="card">
        <h2> Heart Health</h2>
        <p id="hr"></p>
        <p id="spo2"></p>
    </div>

    <div class="card">
        <h2> Neural Health</h2>
        <p id="temp"></p>
        <p id="stress"></p>
    </div>

    <div class="card">
        <h2> Activity</h2>
        <p id="steps"></p>
    </div>

    <div class="card">
        <h2> Wellness</h2>
        <p id="hrv"></p>
    </div>

    <div class="card">
        <h2> Alerts</h2>
        <p id="alerts" class="alerts"></p>
    </div>


    <div class="card">
        <h2> AI Prediction</h2>
        <p id="prediction"></p>
        <p id="trend"></p>
    </div>

</div>

<h2 style="text-align:center;"> Heart Rate Graph</h2>
<canvas id="hrChart" width="400" height="150"></canvas>

<audio id="alarmSound">
    <source src="https://www.soundjay.com/buttons/beep-01a.mp3" type="audio/mpeg">
</audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    var firebaseConfig = {
        databaseURL: "https://medialert-c0f64-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);

    var ref = firebase.database().ref("health_data");

    const ctx = document.getElementById('hrChart').getContext('2d');

    let hrData = [];
    let labels = [];

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Heart Rate (BPM)',
                data: hrData,
                borderWidth: 2,
                fill: false,
                tension: 0.3
            }]
        },
        options: {
            animation: false,
            responsive: true
        }
    });

    ref.on("child_added", function(snapshot) {
        var latest = snapshot.val();
        if (!latest || !latest.data) return;

        let hr = latest.data.heart_rate;
        let time = latest.data.time;

        document.getElementById("hr").innerText = "Heart Rate: " + hr;
        document.getElementById("spo2").innerText = "SpO2: " + latest.data.spo2;
        document.getElementById("temp").innerText = "Temperature: " + latest.data.temperature;
        document.getElementById("stress").innerText = "Stress: " + latest.data.stress;
        document.getElementById("steps").innerText = "Steps: " + latest.data.steps;
        document.getElementById("hrv").innerText = "HRV: " + latest.data.hrv;

   
        let status = latest.prediction;
        let el = document.getElementById("prediction");

        el.innerText = "Status: " + status;

        if (status === "CRITICAL") el.style.color = "red";
        else if (status === "WARNING") el.style.color = "orange";
        else el.style.color = "green";

  
        let alerts = latest.alerts;
        document.getElementById("alerts").innerText = alerts.join(", ");

        let alertBox = document.getElementById("alertBox");

        let isEmergency = alerts.some(a =>
            a.includes("Low Oxygen") ||
            a.includes("High Heart Rate") ||
            a.includes("Low Heart Rate")
        );

        if (isEmergency) {
            alertBox.style.display = "block";
            alertBox.style.background = "red";
            alertBox.innerText = " CRITICAL: " + alerts.join(" | ");
            document.body.classList.add("alert-active");
            document.getElementById("alarmSound").play();
        }
        else if (alerts.length > 0) {
            alertBox.style.display = "block";
            alertBox.style.background = "orange";
            alertBox.innerText = " " + alerts.join(" | ");
            document.body.classList.remove("alert-active");
        }
        else {
            alertBox.style.display = "none";
            document.body.classList.remove("alert-active");
        }


        hrData.push(hr);
        labels.push(time);

        if (hrData.length > 20) {
            hrData.shift();
            labels.shift();
        }

let trendText = "Stable";

if (hrData.length >= 5) {
    let diff = hrData[hrData.length - 1] - hrData[hrData.length - 5];

    if (diff > 10) trendText = "Rising ";
    else if (diff < -10) trendText = "Falling ";
}

document.getElementById("trend").innerText = "Trend: " + trendText;

        chart.update();
    });
</script>

</body>
</html>
